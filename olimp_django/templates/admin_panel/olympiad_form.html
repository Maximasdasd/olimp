{% extends "base.html" %}
{% block title %}{% if is_new %}Создание{% else %}Редактирование{% endif %} олимпиады{% endblock %}
{% block content %}
<div class="card" style="max-width:560px; margin:auto;">
    <h1>{% if is_new %}Создание{% else %}Редактирование{% endif %} олимпиады</h1>
    <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Сохранить</button>
        <a href="{% url 'admin_dashboard' %}" class="btn secondary">Отмена</a>
    </form>
</div>
{% endblock %}
