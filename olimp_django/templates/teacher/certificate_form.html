{% extends "base.html" %}
{% block title %}Бланк сертификата{% endblock %}
{% block content %}
<div class="card" style="max-width:520px; margin:auto;">
    <h1>Бланк сертификата/грамоты: {{ olympiad.title }}</h1>
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Добавить бланк</button>
        <a href="{% url 'teacher_dashboard' %}" class="btn secondary">Назад</a>
    </form>
</div>
{% endblock %}
