{% extends "base.html" %}
{% block title %}Положение и задания{% endblock %}
{% block content %}
<div class="card" style="max-width:520px; margin:auto;">
    <h1>Положение и задания: {{ olympiad.title }}</h1>
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Загрузить</button>
        <a href="{% url 'teacher_dashboard' %}" class="btn secondary">Назад</a>
    </form>
</div>
{% endblock %}
