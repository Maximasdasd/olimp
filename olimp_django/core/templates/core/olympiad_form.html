{% extends "core/base.html" %}
{% block title %}Создание олимпиады{% endblock %}
{% block content %}
<div class="card" style="max-width:560px; margin:auto;">
    <h1>Создание олимпиады</h1>
    <form method="post">{% csrf_token %}
        <p><label>Название</label><input name="title" required></p>
        <p><label>Описание</label><textarea name="description" rows="3"></textarea></p>
        <p><label>Год</label><input name="year" type="number" value="2025" required></p>
        <p><label>Дата начала</label><input name="start_date" type="date"></p>
        <p><label>Дата окончания</label><input name="end_date" type="date"></p>
        <p><label>Уровень</label><input name="level"></p>
        <p><label>ID ответственного преподавателя (необязательно)</label><input name="teacher_id" type="number"></p>
        <button class="btn" type="submit">Сохранить</button>
        <a href="{% url 'admin_dashboard' %}" class="btn secondary">Отмена</a>
    </form>
</div>
{% endblock %}
