{% extends "core/base.html" %}
{% block title %}Создание студента{% endblock %}
{% block content %}
<div class="card" style="max-width:520px; margin:auto;">
    <h1>Создание учётной записи студента</h1>
    <form method="post">{% csrf_token %}
        <p><label>Имя пользователя</label><input name="username" required></p>
        <p><label>ФИО</label><input name="full_name" required></p>
        <p><label>Электронная почта</label><input name="email" type="email" required></p>
        <p><label>Пароль</label><input name="password" type="password" required></p>
        <p><label>Учебное заведение</label><input name="institution"></p>
        <p><label>Уровень образования</label><input name="education_level"></p>
        <p><label>Курс</label><input name="course" type="number"></p>
        <p><label>Специальность</label><input name="specialty"></p>
        <button class="btn" type="submit">Создать</button>
        <a href="{% url 'teacher_dashboard' %}" class="btn secondary">Назад</a>
    </form>
</div>
{% endblock %}
