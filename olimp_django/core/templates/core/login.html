{% extends "core/base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:auto;">
    <h1>Вход в систему</h1>
    <p class="muted">Введите логин и пароль.</p>
    <form method="post">{% csrf_token %}
        <p><label>Имя пользователя</label><input name="username" required></p>
        <p><label>Пароль</label><input name="password" type="password" required></p>
        <button class="btn" type="submit">Войти</button>
    </form>
    <p class="muted" style="margin-top:14px;">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</div>
{% endblock %}
